services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=goldie
      - POSTGRES_PASSWORD=goldiepassword
      - POSTGRES_DB=goldies_registration
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules
    environment:
      - PORT=5001
      - DATABASE_URL=postgres://goldie:goldiepassword@db:5432/goldies_registration
      - JWT_SECRET=goldies-jwt-dev-secret-2026
      - JWT_REFRESH_SECRET=goldies-jwt-refresh-dev-secret-2026
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - APP_URL=http://localhost:5180
      - ADMIN_EMAIL=admin@goldies.com
      - ADMIN_PASSWORD=AdminPass123!
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend

volumes:
  postgres_data:
