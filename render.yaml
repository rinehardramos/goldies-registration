databases:
  - name: goldies-db
    plan: free

services:
  - type: web
    name: goldies-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goldies-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: APP_URL
        value: https://goldies.space
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: goldies2026
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://goldies-backend-s3j5.onrender.com
