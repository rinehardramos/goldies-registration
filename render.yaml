databases:
  - name: goldies-db
    plan: free

services:
  - type: web
    name: goldies-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goldies-db
          property: connectionString

  - type: web
    name: goldies-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: goldies-backend
          type: web
          property: host
