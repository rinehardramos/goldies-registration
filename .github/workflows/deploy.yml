name: Validate Railway Deploy Source

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check backend syntax
        working-directory: backend
        run: |
          node -c index.js
          node -c routes/auth.js
          node -c routes/admin.js
          node -c routes/checkin.js
          node -c routes/qr.js
          node -c seed.js
