services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=goldie
      - POSTGRES_PASSWORD=goldiepassword
      - POSTGRES_DB=goldies_registration
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules
    environment:
      - PORT=5001
      - DATABASE_URL=postgres://goldie:goldiepassword@db:5432/goldies_registration
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend

volumes:
  postgres_data:
